<!DOCTYPE html>
<html lang="de">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #080808; color: #f0f0f0; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes clipReveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0% 0 0); }
    }
    @keyframes counterUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

const { useState, useEffect, useRef } = React;

// ── Logo ──────────────────────────────────────────────────────────────────────
function Logo({ size = 32 }) {

        <rect x="0" y="26.6" width="56" height="13.4" fill="#FFCC00"/>
        <text x="28" y="26" textAnchor="middle" fontFamily="Bebas Neue, sans-serif" fontSize="22" fill="white" letterSpacing="1">DC</text>
      </svg>
      <span style={{ fontFamily: 'Bebas Neue', fontSize: size * 0.65, letterSpacing: 2, color: '#f0f0f0' }}>DEUTSCHE CLIPPER</span>

}

      opacity: 0.4,
    }} />

}

// ── Nav ───────────────────────────────────────────────────────────────────────
function Nav({ accent, scrolled }) {
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      padding: '0 40px',
      height: 64,

    }}>
      <Logo size={28} />
      <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>

              display: 'inline-block',

          </div>

          <div style={{

          }}>
            <h1 style={{
              fontFamily: 'Bebas Neue',
              fontSize: 'clamp(80px, 12vw, 180px)',
              lineHeight: 0.9,
              letterSpacing: 2,
              color: '#f0f0f0',
              textWrap: 'balance',
            }}>
              CLIP IT.<br />
              <span style={{ color: accent, WebkitTextStroke: '0px' }}>CASH</span>

            opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(30px)',
            transition: 'all 0.9s cubic-bezier(0.16,1,0.3,1) 0.25s',
            marginTop: 32,
            display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0,
            maxWidth: 760,

            <p style={{
              fontSize: 20, fontWeight: 300, lineHeight: 1.6,

              transition: 'transform 0.15s, opacity 0.15s',

            onMouseEnter={e => e.currentTarget.style.opacity = '0.9'}

                  <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.35)', marginTop: 2 }}>{s.sub}</div>

      {isSplit && (
        <div style={{ position: 'relative', zIndex: 2, display: 'grid', gridTemplateColumns: '1fr 1fr', minHeight: '80vh' }}>

            <div style={{
              opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(30px)',
              transition: 'all 0.8s cubic-bezier(0.16,1,0.3,1)',
            }}>
              <div style={{
                display: 'inline-block', background: accent, color: '#080808',
                fontFamily: 'DM Sans', fontSize: 11, fontWeight: 700,
                letterSpacing: 3, padding: '5px 12px', marginBottom: 24, textTransform: 'uppercase',
              }}>Für Clipper</div>
              <h1 style={{
                fontFamily: 'Bebas Neue', fontSize: 'clamp(60px, 7vw, 120px)',
                lineHeight: 0.92, letterSpacing: 1.5, color: '#f0f0f0', marginBottom: 24,
              }}>DEIN<br /><span style={{ color: accent }}>SCHNITT</span><br />DEIN<br />GELD</h1>
              <p style={{ fontSize: 17, fontWeight: 300, color: 'rgba(255,255,255,0.6)', lineHeight: 1.65, marginBottom: 36, maxWidth: 400 }}>
                Professionelle Clipper arbeiten mit Top-Creatorn zusammen und verdienen direkt an ihren Views.
              </p>
              <a href="#waitlist" style={{
                background: accent, color: '#080808', padding: '14px 32px',
                fontFamily: 'DM Sans', fontSize: 15, fontWeight: 700,
                textDecoration: 'none', display: 'inline-block',

            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 60,
          }}>

              width: '100%', maxWidth: 340, aspectRatio: '9/16',
              background: 'rgba(255,255,255,0.04)',
              border: '1px solid rgba(255,255,255,0.08)',

              display: 'flex', alignItems: 'center', justifyContent: 'center',

              }} />

                <div style={{ fontFamily: 'Bebas Neue', fontSize: 18, color: 'rgba(255,255,255,0.2)', letterSpacing: 2 }}>CLIP PREVIEW</div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.15)', marginTop: 8 }}>kurzvideo · 60s</div>
              </div>
              <div style={{
                position: 'absolute', bottom: 0, left: 0, right: 0, padding: '20px 16px',
                background: 'linear-gradient(transparent, rgba(0,0,0,0.8))',
              }}>
                <div style={{ fontSize: 12, color: accent, fontWeight: 600 }}>+1.284 Views heute</div>
                <div style={{ fontFamily: 'Bebas Neue', fontSize: 22, color: '#fff', letterSpacing: 1, marginTop: 2 }}>+0,64 € EARNED</div>
              </div>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}

// ── How it works ──────────────────────────────────────────────────────────────
function HowItWorks({ accent }) {
  const steps = [
    { num: '01', title: 'Creator aussuchen', desc: 'Durchsuche Creator, die aktiv Clipper suchen. Bewirb dich kostenlos auf ihre Kanäle.' },
    { num: '02', title: 'Clips erstellen', desc: 'Schneid die besten Momente aus dem Content. Short-Form für TikTok, Reels und YouTube Shorts.' },
    { num: '03', title: 'Geld verdienen', desc: 'Pro 1.000 Views erhältst du direkt deine Vergütung — automatisch, transparent, auf dein Konto.' },
  ];

  return (
    <section style={{ padding: '100px 40px', maxWidth: 1200, margin: '0 auto' }}>
      <div style={{ marginBottom: 64 }}>
        <div style={{
          fontFamily: 'DM Sans', fontSize: 12, fontWeight: 700, letterSpacing: 4,
          color: accent, textTransform: 'uppercase', marginBottom: 16,
        }}>So funktioniert's</div>
        <h2 style={{
          fontFamily: 'Bebas Neue', fontSize: 'clamp(48px, 6vw, 80px)',

        }}>IN DREI SCHRITTEN<br /><span style={{ color: accent }}>ZUM EARNING</span></h2>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 2 }}>
        {steps.map((step, i) => (
          <div key={i} style={{
            padding: '48px 40px',
            background: i % 2 === 1 ? 'rgba(255,255,255,0.03)' : 'transparent',
            borderTop: `3px solid ${i === 0 ? accent : 'rgba(255,255,255,0.08)'}`,
            position: 'relative',
          }}>
            <div style={{
              fontFamily: 'Bebas Neue', fontSize: 72, color: 'rgba(255,255,255,0.05)',
              position: 'absolute', top: 20, right: 24, lineHeight: 1,
              userSelect: 'none',
            }}>{step.num}</div>
            <div style={{
              fontFamily: 'Bebas Neue', fontSize: 18, color: accent,
              letterSpacing: 2, marginBottom: 16,
            }}>{step.num}</div>
            <h3 style={{
              fontFamily: 'Bebas Neue', fontSize: 28, letterSpacing: 1,
              color: '#f0f0f0', marginBottom: 16, lineHeight: 1.1,
            }}>{step.title}</h3>
            <p style={{
              fontSize: 15, color: 'rgba(255,255,255,0.55)', lineHeight: 1.7,
              fontWeight: 300,

// ── Waitlist ──────────────────────────────────────────────────────────────────
function Waitlist({ accent }) {
  const [email, setEmail] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [focused, setFocused] = useState(false);
  const [loading, setLoading] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!email) return;
    setLoading(true);
    setTimeout(() => { setLoading(false); setSubmitted(true); }, 800);
  };

  return (
    <section id="waitlist" style={{ padding: '120px 40px', maxWidth: 1200, margin: '0 auto' }}>
      <div style={{
        display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'center',
      }}>
        <div>
          <div style={{
            fontFamily: 'DM Sans', fontSize: 12, fontWeight: 700, letterSpacing: 4,
            color: accent, textTransform: 'uppercase', marginBottom: 20,
          }}>Limitierte Beta-Plätze</div>
          <h2 style={{
            fontFamily: 'Bebas Neue', fontSize: 'clamp(56px, 6vw, 96px)',
            letterSpacing: 2, lineHeight: 0.9, color: '#f0f0f0', marginBottom: 24,
          }}>SICHERE DEINEN<br /><span style={{ color: accent }}>PLATZ</span></h2>
          <p style={{
            fontSize: 17, color: 'rgba(255,255,255,0.55)', lineHeight: 1.7,
            fontWeight: 300, maxWidth: 380,
          }}>
            Sei einer der ersten Clipper auf der Plattform. Beta-Nutzer erhalten exklusiven Zugang zu Premium-Creatorn und erhöhten Vergütungen.
          </p>
        </div>

        <div>
          {!submitted ? (
            <form onSubmit={handleSubmit}>
              <div style={{
                border: `1px solid ${focused ? accent : 'rgba(255,255,255,0.12)'}`,
                background: 'rgba(255,255,255,0.03)',
                padding: '6px 6px 6px 20px',
                display: 'flex', gap: 8, alignItems: 'center',
                transition: 'border-color 0.2s',
                clipPath: 'polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px))',
              }}>
                <input
                  type="email"
                  placeholder="deine@email.de"
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  onFocus={() => setFocused(true)}
                  onBlur={() => setFocused(false)}
                  required
                  style={{
                    flex: 1, background: 'transparent', border: 'none', outline: 'none',
                    fontFamily: 'DM Sans', fontSize: 16, color: '#f0f0f0',
                    padding: '12px 0',
                  }}
                />
                <button type="submit" style={{
                  background: accent, color: '#080808',
                  border: 'none', cursor: 'pointer',
                  fontFamily: 'DM Sans', fontSize: 14, fontWeight: 700,
                  padding: '14px 28px',
                  letterSpacing: 0.3,
                  transition: 'opacity 0.15s',
                  whiteSpace: 'nowrap',
                  opacity: loading ? 0.7 : 1,
                }}
                onMouseEnter={e => e.currentTarget.style.opacity = '0.85'}
                onMouseLeave={e => e.currentTarget.style.opacity = loading ? '0.7' : '1'}
                >{loading ? 'Wird gesendet...' : 'Als Clipper anmelden'}</button>
              </div>
              <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.25)', marginTop: 12, fontWeight: 300 }}>
                Kein Spam. Keine Kosten. Jederzeit abmeldbar.
              </p>

              <div style={{ marginTop: 40, paddingTop: 32, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
                <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.3)', marginBottom: 20, letterSpacing: 0.3 }}>DU BIST EIN CREATOR?</p>
                <a href="creator.html" style={{
                  color: '#E30613', textDecoration: 'none', fontSize: 15, fontWeight: 500,
                  display: 'flex', alignItems: 'center', gap: 8,
                  transition: 'gap 0.2s',
                }}
                onMouseEnter={e => e.currentTarget.style.gap = '14px'}
                onMouseLeave={e => e.currentTarget.style.gap = '8px'}
                >Zur Creator-Anmeldung →</a>
              </div>
            </form>
          ) : (
            <div style={{
              border: `1px solid ${accent}44`,
              background: `${accent}0a`,
              padding: '40px',
              clipPath: 'polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px))',
            }}>
              <div style={{ fontFamily: 'Bebas Neue', fontSize: 32, color: accent, letterSpacing: 2, marginBottom: 12 }}>
                🎉 DU BIST DRIN!
              </div>
              <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.6)', lineHeight: 1.7, fontWeight: 300 }}>
                Wir haben dich auf die Waitlist gesetzt. Du erhältst eine E-Mail sobald wir die Beta für Clipper öffnen.
              </p>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

// ── Footer ────────────────────────────────────────────────────────────────────
function Footer({ accent }) {
  return (
    <footer style={{
      padding: '40px',
      borderTop: '1px solid rgba(255,255,255,0.06)',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    }}>
      <Logo size={22} />
      <div style={{ display: 'flex', gap: 32 }}>
        <a href="creator.html" style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', textDecoration: 'none' }}>Für Creator</a>
        <a href="#" style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', textDecoration: 'none' }}>Impressum</a>
        <a href="#" style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', textDecoration: 'none' }}>Datenschutz</a>
      </div>
      <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.2)' }}>© 2025 Deutsche Clipper</p>
    </footer>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const accent = tweaks.accentColor;

  return (
    <>
      <NoiseOverlay />
      <Nav accent={accent} scrolled={scrolled} />
      <Hero accent={accent} heroStyle={tweaks.heroStyle} showStats={tweaks.showStats} />
      <HowItWorks accent={accent} />
      <Benefits accent={accent} />
      <Waitlist accent={accent} />
      <Footer accent={accent} />

      <TweaksPanel>
        <TweakSection title="Visual">
          <TweakRadio id="heroStyle" label="Hero Layout"
            options={[
              { value: 'typographic', label: 'Typo' },
              { value: 'split', label: 'Split' },
            ]}
          />
          <TweakColor id="accentColor" label="Akzentfarbe" />
          <TweakToggle id="showStats" label="Stats anzeigen" />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
