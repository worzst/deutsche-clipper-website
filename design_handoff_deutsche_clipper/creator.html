<!DOCTYPE html>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #080808; color: #f0f0f0; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }

<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#E30613",
  "heroLayout": "centered",
  "showTicker": true,
  "ctaText": "Als Creator anmelden"
}/*EDITMODE-END*/;

const { useState, useEffect, useRef } = React;

// ── Logo ──────────────────────────────────────────────────────────────────────
function Logo({ size = 32 }) {
  return (
    <a href="clipper.html" style={{ textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 10 }}>
      <svg width={size * 1.4} height={size} viewBox="0 0 56 40" fill="none">
        <rect x="0" y="0" width="56" height="13.3" fill="#080808" stroke="#444" strokeWidth="0.5"/>
        <rect x="0" y="13.3" width="56" height="13.3" fill="#E30613"/>
        <rect x="0" y="26.6" width="56" height="13.4" fill="#FFCC00"/>
        <text x="28" y="26" textAnchor="middle" fontFamily="Bebas Neue, sans-serif" fontSize="22" fill="white" letterSpacing="1">DC</text>
      </svg>
      <span style={{ fontFamily: 'Bebas Neue', fontSize: size * 0.65, letterSpacing: 2, color: '#f0f0f0' }}>DEUTSCHE CLIPPER</span>
    </a>
  );
}

// ── Noise ─────────────────────────────────────────────────────────────────────
function NoiseOverlay() {
  return (
    <div style={{
      position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 1,
      backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E")`,
      opacity: 0.4,
    }} />
  );
}

// ── Ticker ────────────────────────────────────────────────────────────────────
function Ticker({ accent }) {
  const items = ['Mehr Reichweite', 'Virales Wachstum', 'Professionelle Clipper', 'Einfache Abrechnung', 'Nur bei Erfolg', 'DSGVO-konform', 'Made in Germany'];
  const doubled = [...items, ...items];
  return (
    <div style={{
      overflow: 'hidden', borderTop: `1px solid rgba(255,255,255,0.06)`,
      borderBottom: `1px solid rgba(255,255,255,0.06)`,
      background: 'rgba(255,255,255,0.02)',
      padding: '12px 0',
    }}>
      <div style={{
        display: 'flex', gap: 0,
        animation: 'ticker 20s linear infinite',
        width: 'max-content',
      }}>
        {doubled.map((item, i) => (
          <span key={i} style={{
            fontFamily: 'Bebas Neue', fontSize: 15, letterSpacing: 3,
            color: i % 7 === 0 ? accent : 'rgba(255,255,255,0.25)',
            padding: '0 40px',
            textTransform: 'uppercase',
          }}>
            {item}
            <span style={{ marginLeft: 40, color: 'rgba(255,255,255,0.1)' }}>·</span>
          </span>
        ))}
      </div>
    </div>
  );
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function Nav({ accent, scrolled }) {
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      padding: '0 40px', height: 64,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      background: scrolled ? 'rgba(8,8,8,0.92)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(255,255,255,0.06)' : '1px solid transparent',
      transition: 'all 0.3s ease',
    }}>
      <Logo size={28} />
      <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
        <a href="clipper.html" style={{
          color: 'rgba(255,255,255,0.5)', textDecoration: 'none',
          fontFamily: 'DM Sans', fontSize: 14, fontWeight: 500, letterSpacing: 0.5,
          transition: 'color 0.2s',

        onMouseEnter={e => e.target.style.color = '#fff'}
        onMouseLeave={e => e.target.style.color = 'rgba(255,255,255,0.5)'}

          fontFamily: 'DM Sans', fontSize: 13, fontWeight: 600,
          textDecoration: 'none', letterSpacing: 0.3,
          transition: 'opacity 0.2s',
        }}

        onMouseLeave={e => e.target.style.opacity = '1'}
        >Beta-Zugang</a>
      </div>

}

        justifyContent: 'center', position: 'relative', overflow: 'hidden',

      }}>

          position: 'absolute', top: 0, right: 0, width: '45%', bottom: 0,

                    <div key={m.label} style={{ textAlign: 'center' }}>
                      <div style={{ fontFamily: 'Bebas Neue', fontSize: 28, color: accent }}>{m.val}</div>
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', marginTop: 2 }}>{m.label}</div>

                  marginTop: 20, padding: '14px 16px',

                }}>

                  <span style={{ fontFamily: 'Bebas Neue', fontSize: 18, color: accent }}>€ 386,40</span>
                </div>
              </div>

      {showTicker && <Ticker accent={accent} />}

// ── How it works ──────────────────────────────────────────────────────────────
function HowItWorks({ accent }) {
  const steps = [
    { num: '01', title: 'Profil erstellen', desc: 'Beschreibe deinen Kanal und Content. Wir matchen dich mit passenden Clippern aus unserem Netzwerk.' },
    { num: '02', title: 'Clips genehmigen', desc: 'Alle Clips landen zur Freigabe in deinem Dashboard. Volle Kontrolle über deinen Content.' },
    { num: '03', title: 'Wachsen & abrechnen', desc: 'Deine Clips verbreiten sich. Du bezahlst nur für echte Views — direkt über die Plattform abgerechnet.' },
  ];

  return (
    <section style={{ padding: '100px 40px', maxWidth: 1200, margin: '0 auto' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '380px 1fr', gap: 80, alignItems: 'start' }}>
        <div style={{ position: 'sticky', top: 100 }}>
          <div style={{
            fontFamily: 'DM Sans', fontSize: 12, fontWeight: 700, letterSpacing: 4,
            color: accent, textTransform: 'uppercase', marginBottom: 16,
          }}>Ablauf</div>
          <h2 style={{
            fontFamily: 'Bebas Neue', fontSize: 'clamp(44px, 5vw, 72px)',
            letterSpacing: 2, color: '#f0f0f0', lineHeight: 0.95, marginBottom: 24,
          }}>SO<br /><span style={{ color: accent }}>EINFACH</span><br />GEHT'S</h2>
          <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.45)', lineHeight: 1.7, fontWeight: 300 }}>
            Von der Anmeldung bis zu den ersten viralen Clips — in weniger als 48 Stunden.
          </p>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          {steps.map((step, i) => (
            <div key={i} style={{
              padding: '40px 48px',
              background: i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent',
              border: '1px solid rgba(255,255,255,0.05)',
              display: 'flex', gap: 32, alignItems: 'flex-start',
              transition: 'background 0.2s, border-color 0.2s',
            }}
            onMouseEnter={e => {
              e.currentTarget.style.background = `${accent}08`;
              e.currentTarget.style.borderColor = `${accent}33`;
            }}
            onMouseLeave={e => {
              e.currentTarget.style.background = i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent';
              e.currentTarget.style.borderColor = 'rgba(255,255,255,0.05)';
            }}
            >
              <div style={{ flexShrink: 0 }}>
                <div style={{
                  width: 48, height: 48, border: `2px solid ${accent}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <span style={{ fontFamily: 'Bebas Neue', fontSize: 18, color: accent }}>{step.num}</span>
                </div>
              </div>
              <div>
                <h3 style={{
                  fontFamily: 'Bebas Neue', fontSize: 26, letterSpacing: 1,
                  color: '#f0f0f0', marginBottom: 12,
                }}>{step.title}</h3>
                <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.5)', lineHeight: 1.7, fontWeight: 300 }}>{step.desc}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

  const items = [
    { title: 'Nur für Erfolg zahlen', desc: 'Kein Monatsabo, keine Agenturgebühren. Du zahlst ausschließlich pro 1.000 organische Views — keine versteckten Kosten.' },

      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ marginBottom: 64 }}>

            fontFamily: 'Bebas Neue', fontSize: 'clamp(48px, 5vw, 80px)',

          }}>ALLES WAS DU<br /><span style={{ color: accent }}>BRAUCHST</span></h2>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 2 }}>

              borderBottom: i >= 3 ? `3px solid ${i === 3 ? accent : 'rgba(255,255,255,0.08)'}` : 'none',

            }}

              <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.45)', lineHeight: 1.7, fontWeight: 300 }}>{item.desc}</p>

// ── Waitlist ──────────────────────────────────────────────────────────────────
function Waitlist({ accent, ctaText }) {
  const [email, setEmail] = useState('');
  const [name, setName] = useState('');
  const [platform, setPlatform] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [focused, setFocused] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!email) return;
    setLoading(true);
    setTimeout(() => { setLoading(false); setSubmitted(true); }, 900);
  };

  const inputStyle = (field) => ({
    width: '100%', background: 'rgba(255,255,255,0.04)',
    border: `1px solid ${focused === field ? accent : 'rgba(255,255,255,0.1)'}`,
    outline: 'none',
    fontFamily: 'DM Sans', fontSize: 15, color: '#f0f0f0',
    padding: '14px 18px',
    transition: 'border-color 0.2s',
  });

  return (
    <section id="waitlist" style={{ padding: '120px 40px', maxWidth: 1200, margin: '0 auto' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 100, alignItems: 'start' }}>
        <div>
          <div style={{
            fontFamily: 'DM Sans', fontSize: 12, fontWeight: 700, letterSpacing: 4,
            color: accent, textTransform: 'uppercase', marginBottom: 20,
          }}>Creator Beta</div>
          <h2 style={{
            fontFamily: 'Bebas Neue', fontSize: 'clamp(52px, 6vw, 88px)',
            letterSpacing: 2, lineHeight: 0.9, color: '#f0f0f0', marginBottom: 24,
          }}>JETZT<br />BEWERBEN</h2>
          <p style={{
            fontSize: 17, color: 'rgba(255,255,255,0.5)', lineHeight: 1.7,
            fontWeight: 300, maxWidth: 360, marginBottom: 40,
          }}>
            Wir nehmen in der Beta eine begrenzte Anzahl an Creatorn auf. Bewirb dich jetzt und sei dabei wenn die Plattform startet.
          </p>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {[
              { icon: '✓', text: 'Zugang zu einem verifizierten Clipper-Netzwerk' },
              { icon: '✓', text: 'Kostenloses Onboarding & Setup' },
              { icon: '✓', text: 'Beta-Pricing — günstigere Konditionen als später' },
              { icon: '✓', text: 'Direkter Kontakt zum Gründerteam' },
            ].map((item, i) => (
              <div key={i} style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                <span style={{ color: accent, fontWeight: 700, fontSize: 14, marginTop: 2, flexShrink: 0 }}>{item.icon}</span>
                <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.55)', fontWeight: 300, lineHeight: 1.6 }}>{item.text}</span>
              </div>
            ))}
          </div>
        </div>

        <div>
          {!submitted ? (
            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <input
                type="text" placeholder="Dein Name / Kanal-Name"
                value={name} onChange={e => setName(e.target.value)}
                onFocus={() => setFocused('name')}
                onBlur={() => setFocused(null)}
                style={inputStyle('name')}
              />
              <input
                type="email" placeholder="deine@email.de" required
                value={email} onChange={e => setEmail(e.target.value)}
                onFocus={() => setFocused('email')}
                onBlur={() => setFocused(null)}
                style={inputStyle('email')}
              />
              <input
                type="text" placeholder="Hauptplattform (z.B. YouTube, Twitch...)"
                value={platform} onChange={e => setPlatform(e.target.value)}
                onFocus={() => setFocused('platform')}
                onBlur={() => setFocused(null)}
                style={inputStyle('platform')}
              />
              <button type="submit" style={{
                background: accent, color: '#fff',
                border: 'none', cursor: loading ? 'not-allowed' : 'pointer',
                fontFamily: 'DM Sans', fontSize: 15, fontWeight: 700,
                padding: '18px',
                letterSpacing: 0.4,
                marginTop: 8,
                clipPath: 'polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px))',
                opacity: loading ? 0.7 : 1,
                transition: 'opacity 0.15s',
              }}
              onMouseEnter={e => !loading && (e.currentTarget.style.opacity = '0.87')}
              onMouseLeave={e => (e.currentTarget.style.opacity = loading ? '0.7' : '1')}
              >{loading ? 'Wird gesendet...' : ctaText}</button>
              <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.2)', fontWeight: 300, marginTop: 4 }}>
                Kein Spam · DSGVO-konform · Jederzeit abmeldbar
              </p>

              <div style={{ marginTop: 28, paddingTop: 24, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
                <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.3)', marginBottom: 16, letterSpacing: 0.3 }}>DU BIST EIN CLIPPER?</p>
                <a href="clipper.html" style={{
                  color: '#FFCC00', textDecoration: 'none', fontSize: 15, fontWeight: 500,
                  display: 'flex', alignItems: 'center', gap: 8,
                  transition: 'gap 0.2s',
                }}
                onMouseEnter={e => e.currentTarget.style.gap = '14px'}
                onMouseLeave={e => e.currentTarget.style.gap = '8px'}
                >Zur Clipper-Anmeldung →</a>
              </div>
            </form>
          ) : (
            <div style={{
              border: `1px solid ${accent}44`, background: `${accent}0a`, padding: '40px',
              clipPath: 'polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px))',
            }}>
              <div style={{ fontFamily: 'Bebas Neue', fontSize: 32, color: accent, letterSpacing: 2, marginBottom: 12 }}>
                🎉 BEWERBUNG ERHALTEN!
              </div>
              <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.6)', lineHeight: 1.7, fontWeight: 300 }}>
                Wir melden uns zeitnah bei dir. Creators werden manuell geprüft — du hörst von uns sobald du freigeschaltet bist.
              </p>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

// ── Footer ────────────────────────────────────────────────────────────────────
function Footer({ accent }) {
  return (
    <footer style={{
      padding: '40px',
      borderTop: '1px solid rgba(255,255,255,0.06)',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    }}>
      <Logo size={22} />
      <div style={{ display: 'flex', gap: 32 }}>
        <a href="clipper.html" style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', textDecoration: 'none' }}>Für Clipper</a>
        <a href="#" style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', textDecoration: 'none' }}>Impressum</a>
        <a href="#" style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', textDecoration: 'none' }}>Datenschutz</a>
      </div>
      <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.2)' }}>© 2025 Deutsche Clipper</p>
    </footer>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <>
      <NoiseOverlay />
      <Nav accent={tweaks.accentColor} scrolled={scrolled} />
      <Hero accent={tweaks.accentColor} heroLayout={tweaks.heroLayout} showTicker={tweaks.showTicker} />
      <HowItWorks accent={tweaks.accentColor} />
      <Benefits accent={tweaks.accentColor} />
      <Waitlist accent={tweaks.accentColor} ctaText={tweaks.ctaText} />
      <Footer accent={tweaks.accentColor} />

      <TweaksPanel>
        <TweakSection title="Visual">
          <TweakRadio id="heroLayout" label="Hero Layout"
            options={[
              { value: 'centered', label: 'Zentriert' },
              { value: 'split', label: 'Split' },
            ]}
          />
          <TweakColor id="accentColor" label="Akzentfarbe" />
          <TweakToggle id="showTicker" label="Ticker anzeigen" />
        </TweakSection>
        <TweakSection title="Copy">
          <TweakText id="ctaText" label="CTA-Text" />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
